version: '3.8'

services:
  collabora:
    image: collabora/code:latest
    container_name: collabora-online
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      # Domain that is allowed to access Collabora (use localhost for local development)
      - domain=localhost
      # Extra parameters for Collabora
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false
      # Admin console credentials (optional but recommended)
      - username=admin
      - password=admin
      # Dictionaries (optional)
      - dictionaries=en_US
      # Allow WOPI host
      - aliasgroup1=http://localhost:3000
    cap_add:
      - MKNOD
    tty: true
    networks:
      - collabora-network

networks:
  collabora-network:
    driver: bridge