version: '3.8'

services:
  collabora:
    image: collabora/code:latest
    container_name: collabora-online
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      # Domain that is allowed to access Collabora - allow both localhost and host.docker.internal
      - domain=*
     
      # Extra parameters for Collabora - Explicitly allow host.docker.internal with port
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:logging.level=debug
      - username=admin
      - password=admin
      # Dictionaries (optional)
      - dictionaries=en_US
      # Allow WOPI host - using host.docker.internal for Docker-to-host communication
      - aliasgroup1=http://host.docker.internal:3000,http://localhost:300,http://127.0.0.1:300
    cap_add:
      - MKNOD
    tty: true
    networks:
      - collabora-network

networks:
  collabora-network:
    driver: bridge