version: '3.8'

services:
  collabora:
    image: collabora/code:latest
    container_name: collabora-online
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      # Domain - allow all hosts for local development
      - domain=.*
      # Extra parameters for Collabora
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:storage.wopi.host[0]=.* --o:net.post_allow.host[0]=.* --o:logging.level=warning
      # Admin console credentials
      - username=admin
      - password=admin
      # Dictionaries
      - dictionaries=en_US
      # Allow WOPI hosts
      - aliasgroup1=http://host.docker.internal:3000,http://localhost:3000,http://127.0.0.1:3000
    cap_add:
      - MKNOD
    tty: true
    networks:
      - collabora-network

networks:
  collabora-network:
    driver: bridge